default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: brain_power_development

test:
  <<: *default
  database: brain_power_test

production:
  primary:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL", "") %>
  cable:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL", "") %>
    migrations_paths: db/cable_migrate
  queue:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL", "") %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL", "") %>
    migrations_paths: db/cache_migrate